<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPAN | Accident per allau</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1 class="header-title">
            <img src="css/images/icons-svg/alert-white.svg" alt="" class="icon">
            <span>Accident per allau</span>
        </h1>
    </header>

    <main class="container">

        <a href="index.html" class="btn btn-secondary">
            <img src="css/images/icons-svg/back-black.svg" alt="" class="icon">
            <span>Tornar</span>
        </a>

        <section class="card">
            <h2 class="section-title-row">
                <img src="css/images/icons-svg/location-black.svg" alt="" class="icon-sm">
                <span>Localització</span>
            </h2>

            <div class="map-wrapper">
                <div id="map" class="map"></div>

                <button id="btn-gps" class="btn-map-gps btn-icon-only" type="button" title="Centrar amb GPS">
                    <img src="css/images/icons-svg/navigation-black.svg" alt="">
                </button>
            </div>

            <p class="map-hint">
                Toca el mapa per situar l’accident o utilitza el botó GPS.
            </p>

            <div id="coords-info" class="coords-info">
                <span class="coords-content">
                    <img 
                        src="css/images/icons-svg/location-black.svg" 
                        alt="" 
                        class="icon-sm coords-icon"
                    >
                    <span>Cap ubicació seleccionada</span>
                </span>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title-row">
                <img src="css/images/icons-svg/info-black.svg" alt="" class="icon-sm">
                <span>Dades de l’accident</span>
            </h2>

            <div class="camp">
                <label for="lloc">Nom del lloc o sector *</label>
                <input type="text" id="lloc" placeholder="Ex: Canal, vall, cim o sector">
            </div>

            <div class="row-2">
                <div class="camp">
                    <label for="data-accident">Data de l’accident</label>
                    <input type="date" id="data-accident">
                </div>

                <div class="camp">
                    <label for="hora-accident">Hora aproximada</label>
                    <input type="time" id="hora-accident">
                </div>
            </div>

            <div class="camp">
                <label for="activitat">Activitat</label>
                <select id="activitat">
                    <option value="">Tria...</option>
                    <option value="esqui_muntanya">Esquí de muntanya</option>
                    <option value="esqui_fora_pista">Esquí fora pista</option>
                    <option value="snowboard">Snowboard</option>
                    <option value="raquetes">Raquetes</option>
                    <option value="alpinisme">Alpinisme</option>
                    <option value="muntanyisme">Muntanyisme a peu</option>
                    <option value="altres">Altres</option>
                </select>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title-row">
                <img src="css/images/icons-svg/user-black.svg" alt="" class="icon-sm">
                <span>Persones afectades</span>
            </h2>

            <div class="row-2">
                <div class="camp">
                    <label for="membres">Membres del grup</label>
                    <input type="number" id="membres" min="0">
                </div>

                <div class="camp">
                    <label for="arrossegats">Persones arrossegades</label>
                    <input type="number" id="arrossegats" min="0">
                </div>
            </div>

            <div class="row-2">
                <div class="camp">
                    <label for="colgats-complets">Colgats completament</label>
                    <input type="number" id="colgats-complets" min="0">
                </div>

                <div class="camp">
                    <label for="colgats-parcials">Colgats parcialment</label>
                    <input type="number" id="colgats-parcials" min="0">
                </div>
            </div>

            <div class="row-2">
                <div class="camp">
                    <label for="ferits">Ferits</label>
                    <input type="number" id="ferits" min="0">
                </div>

                <div class="camp">
                    <label for="morts">Morts</label>
                    <input type="number" id="morts" min="0">
                </div>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title-row">
                <img src="css/images/icons-svg/check-black.svg" alt="" class="icon-sm">
                <span>Material de seguretat</span>
            </h2>

            <div class="checkbox-group">
                <label>
                    <input type="checkbox" id="arva">
                    <span>ARVA / DVA</span>
                </label>

                <label>
                    <input type="checkbox" id="pala">
                    <span>Pala</span>
                </label>

                <label>
                    <input type="checkbox" id="sonda">
                    <span>Sonda</span>
                </label>

                <label>
                    <input type="checkbox" id="airbag">
                    <span>Airbag</span>
                </label>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title-row">
                <img src="css/images/icons-svg/clock-black.svg" alt="" class="icon-sm">
                <span>Rescat</span>
            </h2>

            <div class="camp">
                <label for="rescat">Tipus de rescat</label>
                <select id="rescat">
                    <option value="">Tria...</option>
                    <option value="autorescat">Autorescat</option>
                    <option value="victima_sola">La víctima ha sortit pels seus propis mitjans</option>
                    <option value="rescat_organitzat">Rescat organitzat</option>
                    <option value="autorescat_i_organitzat">Autorescat + rescat organitzat</option>
                    <option value="altres">Altres</option>
                </select>
            </div>

            <div class="camp">
                <label for="temps-rescat">Durada aproximada del rescat, en minuts</label>
                <input type="number" id="temps-rescat" min="0">
            </div>
        </section>

        <section class="card">
            <h2 class="section-title-row">
                <img src="css/images/icons-svg/alert-black.svg" alt="" class="icon-sm">
                <span>Allau</span>
            </h2>

            <div class="row-2">
                <div class="camp">
                    <label for="mida">Mida estimada</label>
                    <select id="mida">
                        <option value="">Tria...</option>
                        <option value="D1">D1</option>
                        <option value="D2">D2</option>
                        <option value="D3">D3</option>
                        <option value="D4">D4</option>
                        <option value="D5">D5</option>
                        <option value="desconeguda">No ho sé</option>
                    </select>
                </div>

                <div class="camp">
                    <label for="tipus">Tipus d’allau</label>
                    <select id="tipus">
                        <option value="">Tria...</option>
                        <option value="placa">Placa de vent</option>
                        <option value="neu_recent">Neu recent</option>
                        <option value="neu_humida">Neu humida</option>
                        <option value="fons">Lliscament basal</option>
                        <option value="cfp">Capa feble persistent</option>
                        <option value="desconegut">No ho sé</option>
                    </select>
                </div>
            </div>

            <div class="camp">
                <label for="comentaris">Comentaris</label>
                <textarea id="comentaris" placeholder="Descriu què ha passat"></textarea>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title-row">
                <img src="css/images/icons-svg/camera-black.svg" alt="" class="icon-sm">
                <span>Fotografies</span>
            </h2>

            <div class="row-2">
                <div class="camp">
                    <label class="btn btn-photo" for="foto-camera">
                        <img src="css/images/icons-svg/camera-white.svg" alt="" class="icon">
                        <span>Fer foto</span>
                    </label>

                    <input 
                        type="file" 
                        id="foto-camera" 
                        accept="image/*" 
                        capture="environment"
                    >
                </div>

                <div class="camp">
                    <label class="btn btn-secondary" for="foto-galeria">
                        <img src="css/images/icons-svg/plus-black.svg" alt="" class="icon">
                        <span>Afegir de la galeria</span>
                    </label>

                    <input 
                        type="file" 
                        id="foto-galeria" 
                        accept="image/*" 
                        multiple
                    >
                </div>
            </div>

            <div id="preview-fotos" class="preview-container"></div>
        </section>

        <section class="card">
            <h2 class="section-title-row">
                <img src="css/images/icons-svg/user-black.svg" alt="" class="icon-sm">
                <span>Dades de contacte</span>
            </h2>

            <div class="camp">
                <label for="nom">Nom i cognoms</label>
                <input type="text" id="nom" autocomplete="name">
            </div>

            <div class="row-2">
                <div class="camp">
                    <label for="telefon">Telèfon</label>
                    <input type="tel" id="telefon" autocomplete="tel">
                </div>

                <div class="camp">
                    <label for="email">Correu electrònic</label>
                    <input type="email" id="email" autocomplete="email">
                </div>
            </div>
        </section>

        <button id="btn-guardar" class="btn btn-save" type="button">
            <img src="css/images/icons-svg/check-white.svg" alt="" class="icon">
            <span>Guardar accident offline</span>
        </button>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

    <script src="js/common.js"></script>
    <script src="js/accident.js"></script>

</body>
</html>
