<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPAN | Comunicació d'allaus</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <h1 class="header-title">
            <img src="css/images/icons-svg/alert-white.svg" alt="" class="icon">
            <span>UPAN | Comunicació d'allaus</span>
        </h1>
    </header>

    <main class="container">
        <section class="card home-card">
            <h2>Què vols comunicar?</h2>

            <p class="intro-text">
                Aquesta aplicació permet comunicar observacions d’allaus i accidents relacionats amb allaus.
            </p>

            <div class="home-actions">
                <a href="observacio.html" class="btn btn-primary">
                    <img src="css/images/icons-svg/location-white.svg" alt="" class="icon">
                    <span>He vist una allau</span>
                </a>

                <a href="accident.html" class="btn btn-danger">
                    <img src="css/images/icons-svg/alert-white.svg" alt="" class="icon">
                    <span>Vull informar d’un accident</span>
                </a>

                <a href="pendents.html" class="btn btn-secondary">
                    <img src="css/images/icons-svg/bars-black.svg" alt="" class="icon">
                    <span>Registres pendents</span>
                </a>
            </div>
        </section>
    </main>

</body>
</html>
